FEATURES FONT: \footnotesize
FEATURES SPACE: 3pt

FEATURES:
  - name: Sneak Attack
    description: >-
      Once per turn, Mario deals an extra 10d6 damage to a creature
      he hits with a finesse or ranged weapon attack when he has
      advantage or an ally threatens the target.
    attack: true
    enemy: true

  - name: Cunning Action
    description: >-
      Mario may Dash, Disengage, or Hide as a bonus action.
    bonus: true

  - name: Uncanny Dodge
    description: >-
      When an attacker Mario can see hits him with an attack,
      he may halve the attack's damage.
    reaction: true

  - name: Evasion
    description: >-
      When subjected to an effect allowing a Dexterity saving throw
      for half damage, Mario instead takes no damage on a success
      and only half damage on a failure.

  - name: Reliable Talent
    description: >-
      Any ability check using a proficient skill or tool treats
      rolls lower than 10 as a 10.

  - name: Blindsense
    description: >-
      Mario is aware of hidden or invisible creatures within 10 feet.

  - name: Slippery Mind
    description: >-
      Mario gains proficiency in Wisdom saving throws.

  - name: Elusive
    description: >-
      No attack roll has advantage against Mario while he is conscious.

  - name: Stroke of Luck
    description: >-
      Once per short rest, Mario may turn a missed attack into a hit
      or treat a failed ability check as a natural 20.
    attack: true

  - name: Master of Intrigue
    description: >-
      Mario mimics speech patterns and accents easily and excels at
      maintaining false identities.

  - name: Master of Tactics
    description: >-
      Mario may use the Help action as a bonus action at a range
      of 30 feet.
    bonus: true

  - name: Insightful Manipulator
    description: >-
      After observing or conversing with someone for one minute,
      Mario can assess whether the creature surpasses him in
      Intelligence, Wisdom, Charisma, or class levels.

  - name: Misdirection
    description: >-
      When targeted by an attack while another creature is nearby,
      Mario may cause the attack to target the other creature instead.
    reaction: true
    enemy: true

  - name: Soul of Deceit
    description: >-
      Mario's thoughts cannot be read by telepathy unless he allows it,
      and he presents false thoughts when magically compelled.

